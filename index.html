<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a237e">
    <title>نظام الأشول الذكي V3.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">🚗</div>
            <h2>نظام الأشول الذكي</h2>
            <p>محلات طيب علي صالح الأشول</p>
            <form id="login-form">
                <select id="login-role" required>
                    <option value="manager">مدير</option>
                    <option value="employee">موظف</option>
                </select>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <button type="submit">دخول</button>
            </form>
            <p id="login-error" style="color:red;display:none;">كلمة مرور خاطئة</p>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="splash-screen" style="display:none;">
        <div class="splash-content">
            <div class="splash-logo">🚗</div>
            <h1>نظام الأشول الذكي</h1>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- القائمة العلوية -->
    <header id="main-header" style="display:none;">
        <div class="header-left">
            <button id="menu-toggle" class="icon-btn">☰</button>
            <h1>الأشول الذكي</h1>
        </div>
        <div class="header-right">
            <span id="user-role-display"></span>
            <button id="logout-btn" class="icon-btn">🚪</button>
        </div>
    </header>

    <!-- القائمة الجانبية -->
    <nav id="side-menu">
        <div class="menu-header">
            <div class="menu-logo">🚗</div>
            <h2>محلات طيب علي صالح الأشول</h2>
        </div>
        <ul class="menu-items" id="menu-items-container">
            <!-- تمتلئ حسب الصلاحية -->
        </ul>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main id="main-content" style="display:none;">
        <!-- الصفحات ستنشأ ديناميكياً -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/umd/uuidv4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
